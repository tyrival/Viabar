name: 手动打包并跨仓发布

on:
  workflow_dispatch:
    inputs:
      version:
        description: '请输入发布的版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      body:
        description: '请输入版本更新日志 (选填)'
        required: false
        default: '常规更新与性能优化。'

# 🛠️ 核心修复：强制让 GitHub 所有的 Action 插件提前在 Node.js 24 下运行，从而消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      # 1. 拉取私有仓库的代码（此时警告就会被 env 变量压制消除）
      - name: Checkout source code
        uses: actions/checkout@v4

      # 2. 编译并归档 macOS 应用程序
      - name: Build and Archive App
        run: |
          xcodebuild archive \
            -project Viabar.xcodeproj \
            -scheme Viabar \
            -configuration Release \
            -archivePath ./build/Viabar.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      # 3. 导出 .app 安装包
      - name: Export App
        run: |
          mkdir -p ./dist
          cp -R ./build/Viabar.xcarchive/Products/Applications/Viabar.app ./dist/Viabar.app

      # 4. 使用 macOS 原生工具打包为 .dmg
      - name: Create DMG Packages
        run: |
          hdiutil create -format UDZO \
            -srcfolder ./dist/Viabar.app \
            ./dist/Viabar-${{ github.event.inputs.version }}.dmg
          
          hdiutil create -format UDZO \
            -srcfolder ./dist/Viabar.app \
            ./dist/Viabar-latest.dmg

      # 5. 将生成的 dmg 文件跨仓库发布到 tyrival/Viabar-Release
      - name: Push Release to Public Repo
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          owner: 'tyrival'
          repo: 'Viabar-Release'
          allowUpdates: true
          tag: ${{ github.event.inputs.version }}
          name: 'Release ${{ github.event.inputs.version }}'
          body: ${{ github.event.inputs.body }}
          draft: false
          prerelease: false
          artifacts: "dist/*.dmg"